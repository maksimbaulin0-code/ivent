<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ivent Bot</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div id="app">
        <div id="user-view" class="view">
            <h1 id="display-title">Название мероприятия</h1>
            <p id="display-desc">Здесь будет описание на русском языке.</p>
            <p id="display-date">📅 Дата не выбрана</p>

            <div class="input-group">
                <input type="text" id="user-name" placeholder="Ваше имя">
                <input type="tel" id="user-phone" placeholder="Номер телефона">
                <input type="date" id="birth-date">
                <span id="age-error" class="error">Вам должно быть 18+</span>
            </div>

            <button id="submit-btn" onclick="updateEvent()">ОТПРАВИТЬ ЗАЯВКУ</button>
            <button class="settings-btn" onclick="toggleAdmin()">⚙️</button>
        </div>

        <div id="admin-view" class="view hidden">
            <h2>Админ-панель</h2>
            <div class="input-group">
                <input type="text" id="edit-title" placeholder="Название мероприятия">
                <textarea id="edit-desc" placeholder="Описание мероприятия (на русском)"></textarea>
                <input type="datetime-local" id="edit-date">
            </div>
            
            <button class="primary-btn" onclick="updateEvent()">ОБНОВИТЬ ИВЕНТ</button>
            <button class="secondary-btn" onclick="toggleAdmin()">НАЗАД</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
