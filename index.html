<div id="app-container">
    <section id="view-home" class="view">
        <div class="ticket-card main-card">
            <span class="badge">NEXT EVENT</span>
            <h1 id="display-title">NEON NIGHTS</h1>
            <p id="display-desc">Techno & Industrial set by Resident DJs.</p>
            <div id="display-date">📅 12 апреля, 23:00</div>
        </div>

        <form id="pass-form" class="registration-form">
            <div class="input-group">
                <label>Дата рождения</label>
                <input type="date" id="birth-date" required>
            </div>
            <div class="input-group">
                <label>Номер телефона</label>
                <input type="tel" id="phone" placeholder="+7..." required>
            </div>
            <button type="submit" id="submit-btn" disabled>ЗАБРОНИРОВАТЬ</button>
        </form>
    </section>

    <section id="view-tickets" class="view hidden">
        <h2 class="page-title">Мои Билеты</h2>
        <div id="tickets-container">
            <div class="empty-state">У вас пока нет билетов</div>
        </div>
    </section>

    <section id="view-profile" class="view hidden">
        <h2 class="page-title">Профиль</h2>
        <div class="profile-box">
            <div class="user-avatar" id="user-avatar">?</div>
            <h3 id="user-full-name">User Name</h3>
            <p id="user-handle">@username</p>
        </div>
        <button class="btn-secondary" onclick="toggleAdmin()">АДМИН ПАНЕЛЬ</button>
    </section>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="switchView('home', this)">
            <span class="nav-icon">🏠</span>
            <span class="nav-label">Главная</span>
        </div>
        <div class="nav-item" onclick="switchView('tickets', this)">
            <span class="nav-icon">🎟️</span>
            <span class="nav-label">Билеты</span>
        </div>
        <div class="nav-item" onclick="switchView('profile', this)">
            <span class="nav-icon">👤</span>
            <span class="nav-label">Профиль</span>
        </div>
    </nav>
</div>
