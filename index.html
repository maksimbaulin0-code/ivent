<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ivent Bot Pass</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div id="app-viewport">
        
        <main id="app-content">
            
            <section id="view-home" class="view">
                <div class="ticket-card">
                    <span class="badge">NEXT EVENT</span>
                    <h1 id="display-title">NEON NIGHTS</h1>
                    <p id="display-desc">Techno & Industrial set by Resident DJs. Entrance by guestlist only.</p>
                    <div class="event-info">
                        <span id="display-date">📅 12 апреля, 23:00</span>
                    </div>
                </div>

                <form id="pass-form" class="registration-form">
                    <div class="input-group">
                        <label>Дата рождения</label>
                        <input type="date" id="birth-date" required>
                        <span id="age-error" class="error-msg">Должно быть 18 лет</span>
                    </div>

                    <div class="input-group">
                        <label>Номер телефона</label>
                        <input type="tel" id="phone" placeholder="+7 (999) 000-00-00" required>
                    </div>

                    <button type="submit" id="submit-btn" disabled>ПОЛУЧИТЬ ПРОХОДКУ</button>
                </form>
            </section>

            <section id="view-tickets" class="view hidden">
                <h2>Мои билеты</h2>
                <div class="empty-state">Пусто</div>
            </section>

            <section id="view-profile" class="view hidden">
                <h2>Профиль</h2>
                </section>
        </main>

        <nav class="bottom-nav">
            <button class="nav-item active" onclick="switchView('home', this)">
                <span class="nav-icon">🏠</span>
                <span class="nav-label">ГЛАВНАЯ</span>
            </button>
            <button class="nav-item" onclick="switchView('tickets', this)">
                <span class="nav-icon">🎟️</span>
                <span class="nav-label">БИЛЕТЫ</span>
            </button>
            <button class="nav-item" onclick="switchView('profile', this)">
                <span class="nav-icon">👤</span>
                <span class="nav-label">ПРОФИЛЬ</span>
            </button>
        </nav>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
