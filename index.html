<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ivent Bot</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div id="app-viewport">
        <main id="app-content">
            <section id="view-home" class="view">
                <div class="ticket-card">
                    <span class="badge">NEXT EVENT</span>
                    <h1 id="display-title">NEON NIGHTS</h1>
                    <p id="display-desc">Techno & Industrial set by Resident DJs. Entrance by guestlist only.</p>
                    <div class="event-info">
                        <span id="display-date">📅 12 апреля, 23:00 📍 UNDERGROUND CLUB</span>
                    </div>
                </div>

                <form id="pass-form">
                    <div class="input-group">
                        <label>Дата рождения</label>
                        <input type="date" id="birth-date" required>
                    </div>
                    <div class="input-group">
                        <label>Номер телефона</label>
                        <input type="tel" id="phone" placeholder="+7 (999) 000-00-00" required>
                    </div>
                    <button type="submit" id="submit-btn" disabled>ПОЛУЧИТЬ ПРОХОДКУ</button>
                </form>
            </section>

            <section id="view-tickets" class="view hidden">
                <h2 class="page-title">Мои билеты</h2>
                <div id="tickets-container">
                    <div class="empty-state">У вас пока нет билетов</div>
                </div>
            </section>

            <section id="view-profile" class="view hidden">
                <div class="profile-header">
                    <h2 id="user-full-name">Профиль</h2>
                    <p id="user-handle">@username</p>
                </div>
                
                <button class="btn-admin-toggle" onclick="toggleAdminPanel()">⚙️ Админ-панель</button>

                <div id="admin-panel" class="hidden admin-card">
                    <h3>Редактировать ивент</h3>
                    <input type="text" id="edit-title" placeholder="Название мероприятия">
                    <textarea id="edit-desc" placeholder="Описание"></textarea>
                    <input type="text" id="edit-date" placeholder="Дата и время">
                    <button class="btn-save" onclick="updateEventData()">ОБНОВИТЬ ИВЕНТ</button>
                </div>
            </section>
        </main>

        <nav class="bottom-nav">
            <button class="nav-item active" onclick="switchView('home', this)">
                <span class="nav-icon">🏠</span>
                <span class="nav-label">ГЛАВНАЯ</span>
            </button>
            <button class="nav-item" onclick="switchView('tickets', this)">
                <span class="nav-icon">🎟️</span>
                <span class="nav-label">БИЛЕТЫ</span>
            </button>
            <button class="nav-item" onclick="switchView('profile', this)">
                <span class="nav-icon">👤</span>
                <span class="nav-label">ПРОФИЛЬ</span>
            </button>
        </nav>
    </div>
    <script src="app.js"></script>
</body>
</html>
