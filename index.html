<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Club Pass App</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div id="app-container">
        
        <section id="view-home" class="view">
            <div class="ticket-card main-card">
                <span class="badge">NEXT EVENT</span>
                <h1 id="display-title">NEON NIGHTS</h1>
                <p id="display-desc">Techno & Industrial set by Resident DJs. Entrance by guestlist only.</p>
                <div class="event-details">
                    <span id="display-date">📅 12 апреля, 23:00</span>
                </div>
            </div>

            <form id="pass-form" class="registration-form">
                <div class="input-group">
                    <label>Дата рождения</label>
                    <input type="date" id="birth-date" required>
                    <span id="age-error" class="error-msg">Вам должно быть 18 лет</span>
                </div>
                <div class="input-group">
                    <label>Номер телефона</label>
                    <input type="tel" id="phone" placeholder="+7 (999) 000-00-00" required>
                </div>
                <button type="submit" id="submit-btn" disabled>ПОЛУЧИТЬ ПРОХОДКУ</button>
            </form>
        </section>

        <section id="view-tickets" class="view hidden">
            <h2 class="page-title">Мои билеты</h2>
            <div id="tickets-container">
                <div class="empty-state">У вас пока нет активных билетов</div>
            </div>
        </section>

        <section id="view-profile" class="view hidden">
            <h2 class="page-title">Профиль</h2>
            <div class="profile-box">
                <div class="avatar" id="user-avatar">👤</div>
                <h3 id="user-full-name">User</h3>
                <p id="user-handle">@username</p>
            </div>
            
            <div class="admin-trigger">
                <button class="btn-secondary" onclick="toggleAdminPanel()">АДМИН ПАНЕЛЬ</button>
            </div>

            <div id="admin-panel" class="hidden admin-form">
                <input type="text" id="edit-title" placeholder="Название">
                <textarea id="edit-desc" placeholder="Описание"></textarea>
                <input type="text" id="edit-date" placeholder="Дата (напр: 15 мая, 22:00)">
                <button class="btn-primary" onclick="updateEventData()">ОБНОВИТЬ ИВЕНТ</button>
            </div>
        </section>

        <nav class="bottom-nav">
            <div class="nav-item active" onclick="switchView('home', this)">
                <span class="icon">🏠</span><span class="label">Главная</span>
            </div>
            <div class="nav-item" onclick="switchView('tickets', this)">
                <span class="icon">🎟️</span><span class="label">Билеты</span>
            </div>
            <div class="nav-item" onclick="switchView('profile', this)">
                <span class="icon">👤</span><span class="label">Профиль</span>
            </div>
        </nav>
    </div>
    <script src="app.js"></script>
</body>
</html>
